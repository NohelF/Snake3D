<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Snake</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50;
            color: #ecf0f1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 10px;
        }

        #scoreBoard {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        #gameCanvas {
            background-color: #070808;
            border: 2px solid #ecf0f1;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .controls-hint {
            margin-top: 20px;
            font-size: 14px;
            color: #bdc3c7;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>

<body>

    <h1>Snake</h1>
    <div id="scoreBoard">Puntaje: <span id="score">0</span></div>

    <!-- Canvas 400x400, grid 20x20 -->
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="controls-hint">
        Presiona las <strong>flechas del teclado</strong> para jugar.<br>
        Recarga la página para reiniciar si pierdes.
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [
            { x: 10, y: 10 }
        ];

        let vx = 0;
        let vy = 0;

        let foodX = 15;
        let foodY = 15;

        let score = 0;
        let isGameOver = false;
        let hasStarted = false;

        const speed = 10; // FPS (velocidad)

        function drawGame() {
            if (isGameOver) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.75)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "30px Arial";
                ctx.textAlign = "center";
                ctx.fillText("¡Juego Terminado!", canvas.width / 2, canvas.height / 2 - 10);
                ctx.font = "20px Arial";
                ctx.fillText("Puntaje Final: " + score, canvas.width / 2, canvas.height / 2 + 25);
                ctx.font = "16px Arial";
                ctx.fillText("Recarga la pestaña para jugar de nuevo.", canvas.width / 2, canvas.height / 2 + 65);
                return;
            }

            clearScreen();

            if (hasStarted) {
                moveSnake();
                checkCollision();

                if (isGameOver) {
                    drawGame();
                    return;
                }
            }

            checkFoodCollision();
            drawFood();
            drawSnake();

            setTimeout(drawGame, 1000 / speed);
        }

        function clearScreen() {
            ctx.fillStyle = "#34495e";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Dibujar mensaje inicial
            if (!hasStarted && !isGameOver) {
                ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
                ctx.font = "20px Arial";
                ctx.textAlign = "center";
                ctx.fillText("Presiona una flecha para iniciar", canvas.width / 2, canvas.height / 2);
            }
        }

        function drawSnake() {
            ctx.fillStyle = "#2ecc71";
            for (let i = 0; i < snake.length; i++) {
                // Dibujar cabeza diferente al cuerpo (opcional, aquí pintamos todo verde, cabeza algo más oscura si es posible)
                if (i === 0) {
                    ctx.fillStyle = "#27ae60"; // Cabeza más oscura
                } else {
                    ctx.fillStyle = "#2ecc71"; // Cuerpo
                }
                ctx.fillRect(snake[i].x * gridSize, snake[i].y * gridSize, gridSize - 2, gridSize - 2);
            }
        }

        function drawFood() {
            ctx.fillStyle = "#e74c3c";
            ctx.fillRect(foodX * gridSize, foodY * gridSize, gridSize - 2, gridSize - 2);
        }

        function moveSnake() {
            const head = { x: snake[0].x + vx, y: snake[0].y + vy };
            snake.unshift(head);
            snake.pop();
        }

        function checkCollision() {
            const head = snake[0];

            // Choque con paredes
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                isGameOver = true;
            }

            // Choque consigo mismo
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    isGameOver = true;
                }
            }
        }

        function checkFoodCollision() {
            const head = snake[0];

            if (head.x === foodX && head.y === foodY) {
                // Hacer crecer la serpiente duplicando su último elemento
                const tail = { ...snake[snake.length - 1] };
                snake.push(tail);

                score += 10;
                scoreElement.textContent = score;

                placeFood();
            }
        }

        function placeFood() {
            foodX = Math.floor(Math.random() * tileCount);
            foodY = Math.floor(Math.random() * tileCount);

            // Asegurarnos que la comida no aparezca encima de la serpiente
            for (let i = 0; i < snake.length; i++) {
                if (snake[i].x === foodX && snake[i].y === foodY) {
                    placeFood();
                    break;
                }
            }
        }

        document.addEventListener("keydown", (event) => {
            if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].indexOf(event.code) > -1) {
                event.preventDefault(); // Evita que la ventana haga scroll
            }

            if (!hasStarted) {
                hasStarted = true;
            }

            switch (event.code) {
                case "ArrowUp":
                    if (vy === 1) return;
                    vx = 0;
                    vy = -1;
                    break;
                case "ArrowDown":
                    if (vy === -1) return;
                    vx = 0;
                    vy = 1;
                    break;
                case "ArrowLeft":
                    if (vx === 1) return;
                    vx = -1;
                    vy = 0;
                    break;
                case "ArrowRight":
                    if (vx === -1) return;
                    vx = 1;
                    vy = 0;
                    break;
            }
        });

        // Inicializar el juego
        placeFood();
        drawGame();
    </script>
</body>

</html>
